[defaults]
trigger_label = "ai:analyze"
clarification_reminder_days = 7
polling_interval_seconds = 30

[[repos]]
owner_repo = "helpingstar/example-repo"
enabled = true
# If omitted, the title defaults to "<repo>_project_issue_prioritization".
project_v2_impact_field_name = "Total Impact"
project_v2_create_if_missing = true

[[repos]]
owner_repo = "helpingstar/another-repo"
trigger_label = "custom:analyze"
polling_interval_seconds = 60
base_branch_override = "main"
agent_backend_override = "codex"
agent_model_override = "gpt-5.4"
agent_role_override = "iOS developer"
agent_language_override = "Korean"
